<div class="documents-wrapper" [class.documents-wrapper--open]="isMenuOpen">
	<div class="documents-container">
		<div class="documents-list">
			<div class="documents-header">
				<div class="documents-header-left">
					<div class="documents-header-left__arrow">
						<svg
							height="24"
							viewBox="0 0 24 24"
							width="24"
							xmlns="http://www.w3.org/2000/svg"
						>
							<polygon
								fill-rule="evenodd"
								points="9.414 12 16.707 19.293 15.293 20.707 6.586 12 15.293 3.293 16.707 4.707"
							/>
						</svg>
					</div>
					<div
						class="documents-header-left__avatar"
						routerLink="/profile"
					>
						<img [src]="userService.thumb" alt="" />
					</div>
				</div>
				<div class="documents-header__title" translate>
					Theme.Transactions
				</div>
				<div
					(click)="isMenuOpen = !isMenuOpen"
					class="burger-wrap"
					class="burger-wrap"
				>
					<div
						class="burger"
						[class.burger--close]="isMenuOpen"
					></div>
				</div>
			</div>
			<div
				class="documents-sidebar"
				[class.documents-sidebar--open]="isMenuOpen"
			>
				<div
					class="documents-sidebar__close"
					(click)="isMenuOpen = !isMenuOpen"
				>
					<svg
						style="enable-background: new 0 0 24 24"
						version="1.1"
						viewBox="0 0 24 24"
						xml:space="preserve"
						xmlns="http://www.w3.org/2000/svg"
						xmlns:xlink="http://www.w3.org/1999/xlink"
					>
						<style type="text/css">
							.st0 {
								opacity: 0.2;
								fill: none;
								stroke: #000000;
								stroke-width: 5e-2;
								stroke-miterlimit: 10;
							}
						</style>
						<g id="grid_system" />
						<g id="_icons">
							<path
								d="M5.3,18.7C5.5,18.9,5.7,19,6,19s0.5-0.1,0.7-0.3l5.3-5.3l5.3,5.3c0.2,0.2,0.5,0.3,0.7,0.3s0.5-0.1,0.7-0.3   c0.4-0.4,0.4-1,0-1.4L13.4,12l5.3-5.3c0.4-0.4,0.4-1,0-1.4s-1-0.4-1.4,0L12,10.6L6.7,5.3c-0.4-0.4-1-0.4-1.4,0s-0.4,1,0,1.4   l5.3,5.3l-5.3,5.3C4.9,17.7,4.9,18.3,5.3,18.7z"
							/>
						</g>
					</svg>
				</div>
				<div class="documents-sidebar-content" *ngIf="budget_id">
					<ng-container>
						<div class="documents-sidebar__img">
							<img
								[src]="budget.thumb ? 'https://webart.work' + budget.thumb : 'assets/logo.png'"
								alt=""
							/>
						</div>
						<div class="documents-sidebar__title">
							{{budget.name}}
						</div>
						<div class="documents-sidebar__title">
							{{budget.amount||0}} {{budget.currency}}
						</div>
						<div class="documents-sidebar__description">
							{{budget.description}}
						</div>
					</ng-container>
					<wbutton (click)="create()">
						<span translate>Common.Add transaction</span>
					</wbutton>
				</div>
			</div>
			<div class="documents-main">
				<div class="documents-main-content">
					<div
						*ngFor="let transaction of transactions"
						class="documents-main-row"
					>
						<app-transaction
							[transaction]="transaction"
							[budget_id]="budget_id"
							(reload)="load()"
						></app-transaction>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>
